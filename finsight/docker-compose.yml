version: "3.9"

services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db    # persist vector store between restarts
      - ./mlruns:/app/mlruns          # persist MLflow runs
    env_file: ./backend/.env
    depends_on:
      - mlflow
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns
    volumes:
      - ./mlruns:/mlflow/mlruns
    restart: unless-stopped
